<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1d29">
  <title>Mon Agenda</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📅</text></svg>">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
  <div id="banner" class="banner hidden"></div>

  <header class="topbar">
    <h1>📅 Mon Agenda</h1>
    <div class="nav">
      <button id="prevWeek" class="nav-btn" title="Semaine précédente">‹</button>
      <button id="todayBtn" class="nav-btn today">Aujourd'hui</button>
      <button id="nextWeek" class="nav-btn" title="Semaine suivante">›</button>
    </div>
    <div id="weekLabel" class="week-label"></div>
  </header>

  <!-- Onglets par personne -->
  <div class="tabs">
    <button class="tab" data-person="Arnaud">🎾 Arnaud</button>
    <button class="tab" data-person="Emma">🌸 Emma</button>
  </div>

  <main class="layout">
    <section id="week" class="week"></section>

    <!-- Panneau latéral : statistiques -->
    <aside class="sidebar">
      <div class="stat-card">
        <h3 id="cardWeekTitle">📆 Cette semaine</h3>
        <div id="cardWeek" class="stat-values"></div>
      </div>
      <div class="stat-card">
        <h3 id="cardMonthTitle">🗓️ Ce mois-ci</h3>
        <div id="cardMonth" class="stat-values"></div>
      </div>
      <div class="stat-card">
        <div class="card-head">
          <h3>📊 Historique</h3>
          <div class="granularity-toggle">
            <button id="statsByMonth" class="gran-btn active">Mois</button>
            <button id="statsByWeek" class="gran-btn">Semaine</button>
          </div>
        </div>
        <div id="historyBody" class="history"></div>
      </div>
    </aside>
  </main>

  <!-- Modale création / édition -->
  <div id="modalOverlay" class="overlay hidden">
    <div class="modal">
      <h2 id="modalTitle">Nouvel événement</h2>
      <form id="eventForm">
        <input type="hidden" id="eventId">
        <label>Type
          <select id="type">
            <option value="Tennis">🎾 Tennis</option>
            <option value="Tennis - Service">🎯 Tennis - Service</option>
            <option value="Prépa physique">💪 Prépa physique</option>
            <option value="Sorties Amis">🍻 Sorties Amis</option>
            <option value="Achats">🛒 Achats</option>
            <option value="Autre">📌 Autre</option>
          </select>
        </label>
        <label>Titre
          <input type="text" id="title" list="titleSuggestions" placeholder="Ex : Tennis, Poker, Séance sport…" required autocomplete="off">
          <datalist id="titleSuggestions"></datalist>
        </label>
        <label>Date
          <input type="date" id="date" required>
        </label>
        <div class="row">
          <label>Début
            <input type="time" id="startTime" required step="300">
          </label>
          <label>Fin
            <input type="time" id="endTime" required step="300">
          </label>
        </div>
        <label>Description <span class="optional">(optionnel)</span>
          <textarea id="description" rows="3" placeholder="Ex : 20 squats - 40 pompes"></textarea>
        </label>
        <div class="modal-actions">
          <button type="button" id="deleteBtn" class="btn danger hidden">Supprimer</button>
          <span class="spacer"></span>
          <button type="button" id="cancelBtn" class="btn ghost">Annuler</button>
          <button type="submit" class="btn primary">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=5"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
